services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teamfinder
      POSTGRES_USER: teamfinder
      POSTGRES_PASSWORD: teamfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_demo && python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: teamfinder
      POSTGRES_USER: teamfinder
      POSTGRES_PASSWORD: teamfinder
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
